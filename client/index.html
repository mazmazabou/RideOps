<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RideOps</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/vendor/tabler/tabler.min.css">
  <link rel="stylesheet" href="/vendor/tabler-icons/tabler-icons.min.css">
  <link rel="stylesheet" href="/css/rideops-theme.css">
  <script src="/campus-themes.js"></script>
  <script>
    // Synchronous FOUC prevention: apply campus colors and title before first paint
    (function() {
      function hexToRgb(hex) {
        hex = hex.replace('#', '');
        if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
        var n = parseInt(hex, 16);
        return ((n >> 16) & 255) + ', ' + ((n >> 8) & 255) + ', ' + (n & 255);
      }
      var parts = window.location.pathname.split('/').filter(Boolean);
      var slug = ['usc','stanford','ucla','uci'].indexOf(parts[0]) !== -1 ? parts[0] : null;
      window.__RIDEOPS_CAMPUS_SLUG__ = slug;
      var titles = { usc: 'USC DART', stanford: 'Stanford ATS', ucla: 'UCLA BruinAccess', uci: 'UCI AnteaterExpress' };
      var campusName = (slug && titles[slug]) ? titles[slug] : 'RideOps';
      document.title = campusName + ' \u00b7 Rider';
      if (slug && typeof CAMPUS_THEMES !== 'undefined' && CAMPUS_THEMES[slug]) {
        var ct = CAMPUS_THEMES[slug];
        var root = document.documentElement;
        root.style.setProperty('--color-primary', ct.primaryColor);
        root.style.setProperty('--color-primary-rgb', hexToRgb(ct.primaryColor));
        if (ct.headerBg) root.style.setProperty('--color-header-bg', ct.headerBg);
        if (ct.secondaryColor) root.style.setProperty('--color-secondary', ct.secondaryColor);
        if (ct.secondaryColor) root.style.setProperty('--color-accent', ct.secondaryColor);
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/rider/main.jsx"></script>
</body>
</html>
